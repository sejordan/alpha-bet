repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: .venv/bin/python -m mypy alphabet main.py webapp/app.py
        language: system
        pass_filenames: false
